<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj oglas - Izgubljene živali</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style3.css') }}">
</head>
<body class="main-page">
    <nav class="navbar">
        <div class="nav-logo">🐾 Izgubljene živali</div>
        <div class="nav-links">
            <a href="/" class="btn btn-outline">← Nazaj</a>
            <a href="/logout3" class="btn btn-outline">Odjava</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="form-card">
            <h1>Dodaj oglas</h1>

            <form method="POST">
                <div class="form-group">
                    <label>Ime živali</label>
                    <input type="text" name="ime_zivali" placeholder="npr. Rex, Mici..." required>
                </div>

                <div class="form-group">
                    <label>Vrsta živali</label>
                    <select name="vrsta" required>
                        <option value="">Izberi vrsto...</option>
                        <option value="pes">🐶 Pes</option>
                        <option value="mačka">🐱 Mačka</option>
                        <option value="ptica">🐦 Ptica</option>
                        <option value="drugo">🐾 Drugo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Opis</label>
                    <textarea name="opis" rows="4" placeholder="Barva, velikost, posebne oznake..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Lokacija izgube</label>
                    <input type="text" name="lokacija" placeholder="npr. Ljubljana, park Tivoli" required>
                </div>

                <div class="form-group">
                    <label>Kontakt (telefon ali email)</label>
                    <input type="text" name="kontakt" placeholder="npr. 041 123 456" required>
                </div>

                <div class="form-group">
                    <label>URL slike (neobvezno)</label>
                    <input type="text" name="slika_url" placeholder="https://...">
                </div>

                <button type="submit" class="btn btn-primary btn-full">Objavi oglas</button>
            </form>
        </div>
    </div>
</body>
</html>
