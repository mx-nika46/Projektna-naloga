<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style3.css') }}">
</head>
<body>

<div class="navbar">
    <h2>Pet App</h2>
    <a href="/add">+ Dodaj žival</a>
</div>

<div class="container">
    <h2>Vse živali</h2>

    {% for pet in pets %}
        <div class="card">
            <h3>{{ pet.name }}</h3>
            <p><b>Vrsta:</b> {{ pet.animal }}</p>
            <p>{{ pet.description }}</p>

            <a href="/pet/{{ loop.index }}">Poglej več</a>
        </div>
    {% endfor %}
</div>

</body>
</html>
