<h2>Dodaj objavo</h2>

<form method="POST">
    <input name="name" placeholder="Ime"><br>
    <input name="animal" placeholder="Vrsta"><br>
    <input name="location" placeholder="Lokacija"><br>
    <input name="contact" placeholder="Kontakt"><br>

    <select name="status">
