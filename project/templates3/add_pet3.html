<!DOCTYPE html>
<html>
<head>
    <title>Dodaj žival</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style3.css') }}">
</head>
<body>

<div class="navbar">
    <h2>Dodaj žival</h2>
    <a href="/dashboard">Nazaj</a>
</div>

<div class="container">
    <div class="card">
        <form method="POST">
            <input name="name" placeholder="Ime živali" required>
            <input name="animal" placeholder="Vrsta" required>
            <textarea name="description" placeholder="Opis"></textarea>
            <input name="location" placeholder="Lokacija">
            <input name="contact" placeholder="Kontakt">
            
            <select name="status">
                <option value="lost">Izgubljen</option>
                <option value="found">Najden</option>
            </select>

            <button type="submit">Shrani</button>
        </form>
    </div>
</div>

</body>
</html>
