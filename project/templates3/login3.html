<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style3.css') }}">
</head>
<body>

<div class="form-box">
    <h2>Prijava</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Uporabniško ime" required>
        <input type="password" name="password" placeholder="Geslo" required>
        <button type="submit">Login</button>
    </form>

    <p>Še nimaš računa? <a href="/register">Registracija</a></p>
</div>

</body>
</html>
