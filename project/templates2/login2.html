<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava - App2</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style2.css') }}">
</head>

<body>
    <div class="form-box">
        <h1>Prijava</h1>
        
        {% if request.method == 'POST' %}
            <p style="color:red;">Napačno uporabniško ime ali geslo!</p>
        {% endif %}
        
        <form method="POST">
            <input type="text" name="username" placeholder="Uporabniško ime" required autofocus>
            <input type="password" name="password" placeholder="Geslo" required>
            
            <button type="submit">Prijavi se</button>
        </form>
        
        <p>Še nimaš računa? <a href="/register2">Registriraj se</a></p>
    </div>
</body>
</html>
